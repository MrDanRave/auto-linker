name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # triggers on version tags like 1.0.0

permissions:
  contents: write
  id-token: write       # required for build provenance attestations
  attestations: write   # lets users cryptographically verify release assets

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --notes "Auto Linker $tag. See the commit history and SEMANTIC_PLAN.md for what changed." \
            --draft \
            main.js manifest.json versions.json
